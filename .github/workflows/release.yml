name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: # dry run: builds artifacts without publishing

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PKG=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG" ]; then
            echo "Tag v$TAG != package.json version $PKG" >&2
            exit 1
          fi

      - run: npm run build

      - name: Build and publish (tag)
        if: startsWith(github.ref, 'refs/tags/v')
        # Publishes to a DRAFT release; a human publishes it — that's the
        # rollout lever electron-updater serves from.
        run: npx electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EP_DRAFT: 'true'

      - name: Build only (dry run)
        if: "!startsWith(github.ref, 'refs/tags/v')"
        run: npx electron-builder --publish never

      - name: Upload artifacts (dry run)
        if: "!startsWith(github.ref, 'refs/tags/v')"
        uses: actions/upload-artifact@v4
        with:
          name: affilync-desktop-${{ matrix.os }}
          path: |
            release/*.exe
            release/*.dmg
            release/*.zip
            release/*.AppImage
            release/*.deb
          if-no-files-found: warn
